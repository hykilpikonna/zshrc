set -g status 2
set -g status-format[1] '#[fg=#32738c,bg=terminal]î‚º#[bg=#459dbf]î‚¼#[fg=#459dbf,bg=#58c8f2]î‚¼#[fg=#333333] ï‹›  #(~/zshrc/scripts/bin/tmux-tool.py 0 2) #[fg=#58c8f2,bg=#eda4b2]î‚¼#[fg=#333333] ïƒ®  #(~/zshrc/scripts/bin/tmux-tool.py 1 2) #[fg=#eda4b2,bg=#ffffff]î‚¼#[fg=#333333]#[list=on align=#{status-justify}] #(~/zshrc/scripts/bin/tmux-tool.py 2 2) #[fg=#cccccc]î‚ºî‚¼#[fg=#333333] #(~/zshrc/scripts/bin/tmux-tool.py 3 2) #[norange default]#[nolist align=right]#[fg=#ffffff,bg=#eda4b2]î‚¼#[fg=#333333] ï‡«  #(~/zshrc/scripts/bin/tmux-tool.py 4 2) #[fg=#eda4b2,bg=#58c8f2]î‚¼#[fg=#333333] î¿…  #(~/zshrc/scripts/bin/tmux-tool.py 5 2) #[fg=#58c8f2,bg=#459dbf]î‚¼#[fg=#459dbf,bg=#32738c]î‚¼#[fg=#32738c,bg=terminal]î‚¼ '

# Status bar refresh
set -g status-interval 1
