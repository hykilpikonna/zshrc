
set-option -g mouse on
set-option -g history-limit 10000
# set -g default-shell zsh
set -g base-index 1
set -g renumber-windows on
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY"

# Terminal titles and alerts
setw -g allow-rename on
setw -g allow-set-title on
setw -g allow-passthrough on
setw -g monitor-bell on
set -g bell-action any
set -g set-titles on
set -g set-titles-string '#S:#I:#{?pane_title,#{pane_title},#W}#{?session_alerts, #{session_alerts},}'

# Status bar background style
set -g status-style 'bg=#ffffff,fg=#333333'

# Status bar left side
set -g status-left-length 0
set -g status-left '#[fg=#32738c,bg=terminal] î‚º#[bg=#459dbf]î‚¼#[fg=#459dbf,bg=#58c8f2]î‚¼#[fg=#333333] ï”›  #(~/zshrc/scripts/bin/tmux-tool.py 0 1) #[fg=#58c8f2,bg=#eda4b2]î‚¼#[fg=#333333] #(~/zshrc/scripts/bin/time-icon)  #(~/zshrc/scripts/bin/tmux-tool.py 1 1) #[fg=#eda4b2,bg=#ffffff]î‚¼'

# Centered window status
set -g status-justify centre
set -g status-interval 1
set -g window-status-style 'fg=#333333,bg=default'
set -g window-status-current-style 'fg=#333333,bg=default'
set -g window-status-bell-style 'fg=#ffffff,bg=#d75f5f,bold'
set -g window-status-format '#I:#{?pane_title,#{pane_title},#W}#{?window_flags,#{window_flags}, }'
set -g window-status-current-format '#I:#{?pane_title,#{pane_title},#W}#{?window_flags,#{window_flags}, }'
set -g window-status-separator ' î‚ºî‚¼ '

# Status bar right side
set -g status-right-length 0
set -g status-right '#[fg=#ffffff,bg=#eda4b2]î‚¼#[fg=#333333] #(python3 -m hyfetch --print-font-logo || echo "ï’‰")  #(~/zshrc/scripts/bin/tmux-tool.py 4 1) #[fg=#eda4b2,bg=#58c8f2]î‚¼#[fg=#333333] ï‘‚  #(~/zshrc/scripts/bin/tmux-tool.py 5 1) #[fg=#58c8f2,bg=#459dbf]î‚¼#[fg=#459dbf,bg=#32738c]î‚¼#[fg=#32738c,bg=terminal]î‚¼'

# Pane border style
set -g pane-border-style "fg=#865c64"
set -g pane-active-border-style "fg=#eda4b2"
set -g pane-border-status top
set -g pane-border-format '#[bold]#{pane_current_command}#[default]'

